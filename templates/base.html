<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Avito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Mini Avito</a>

        <div>
            {% if current_user.is_authenticated %}
                <a class="btn btn-outline-light me-2" href="/profile">Личный кабинет</a>
                <a class="btn btn-outline-light me-2" href="/my_chats">Мои чаты</a>
                <a class="btn btn-outline-light me-2" href="/logout">Выйти</a>
            {% else %}
                <a class="btn btn-outline-light me-2" href="/login">Войти</a>
                <a class="btn btn-light" href="/register">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
